<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1C Mat — Presentazioni interattive</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f172a; color: #f1f5f9;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .container { max-width: 600px; padding: 40px 20px; text-align: center; }
  h1 { font-size: 2.4rem; color: #38bdf8; margin-bottom: 8px; }
  p { color: #94a3b8; margin-bottom: 32px; font-size: 1.1rem; }
  .cards { display: flex; flex-direction: column; gap: 16px; }
  a.card {
    display: block; background: #1e293b; border: 2px solid #334155;
    border-radius: 14px; padding: 24px; text-decoration: none;
    color: #f1f5f9; transition: all 0.2s; text-align: left;
  }
  a.card:hover { border-color: #38bdf8; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  a.card h2 { font-size: 1.3rem; color: #38bdf8; margin-bottom: 6px; }
  a.card span { color: #94a3b8; font-size: 0.95rem; }
</style>
</head>
<body>
<div class="container">
  <h1>1C Mat</h1>
  <p>Presentazioni interattive di matematica</p>
  <div class="cards">
    <a class="card" href="28_divisione/">
      <h2>28 — Divisione tra polinomi</h2>
      <span>Divisione con resto, metodo della griglia, esercizi guidati</span>
    </a>
    <a class="card" href="38_equazioni/">
      <h2>38 — Equazioni di primo grado</h2>
      <span>Le 3 regole d'oro, bilancia, esercizi step-by-step</span>
    </a>
  </div>
</div>
</body>
</html>
